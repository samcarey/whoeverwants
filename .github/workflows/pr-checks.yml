name: Pull Request Checks

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  pull-requests: write

jobs:
  quality-gate:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    env:
      NODE_ENV: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run full test suite with coverage
        run: npm run test:coverage

      - name: Comment PR with test results
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs')

            let coverageComment = '## Test Coverage\n\nCoverage report will be available after tests complete.\n'

            try {
              const coverage = JSON.parse(fs.readFileSync('./coverage/coverage-summary.json', 'utf8'))
              const linesPct = coverage.total.lines.pct
              const branchesPct = coverage.total.branches.pct
              const funcsPct = coverage.total.functions.pct
              const stmtsPct = coverage.total.statements.pct

              coverageComment = `## Test Coverage

              | Metric | Coverage |
              |--------|----------|
              | Lines | ${linesPct}% |
              | Branches | ${branchesPct}% |
              | Functions | ${funcsPct}% |
              | Statements | ${stmtsPct}% |
              `
            } catch (e) {
              console.log('Coverage file not found, using default message')
            }

            const comment = `## Test Results

            ${coverageComment}`

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            })

            const existingComment = comments.find(comment =>
              comment.body.includes('Test Results'))

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: comment
              })
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment
              })
            }
