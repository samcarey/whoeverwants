name: iOS Build & TestFlight

# Runs on the Mac mini self-hosted runner to build the Capacitor iOS app
# and upload it to TestFlight. Web assets load remotely via server.url in
# capacitor.config.ts, so this workflow rarely needs to run — only when
# native config changes (plugins, permissions, icons, etc.) or a new
# build is needed (e.g. to pick up secrets added after the prior failure).

on:
  push:
    # Build on every branch — pushes to `main` go to TestFlight as the prod
    # bundle (`com.whoeverwants.app`), every other branch builds against
    # the `latest` bundle (`com.whoeverwants.app.latest`) which loads the
    # canary tier (`latest.whoeverwants.com`). One shared `latest` bundle,
    # NOT per-actor: per-author dev infra was retired when dev sites became
    # per-branch, and per-branch dev sites aren't wired up to any iOS app.
    # The path filter still gates on native-relevant files so routine code
    # pushes don't burn TestFlight uploads.
    branches:
      - '**'
    paths:
      - 'capacitor.config.ts'
      - 'ios/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/ios-build.yml'
      - 'scripts/ios/**'
  release:
    # A non-draft / non-prerelease release publish always builds the prod
    # bundle pinned to the release's tag, regardless of which files
    # changed. This keeps the iOS prod build in lockstep with the
    # GitHub Release that drives the rest of the prod deploy (Vercel + the
    # prod droplet's API container both auto-deploy on release publish
    # too; this trigger closes the loop for the native app). Prereleases
    # are excluded — the `prod_only_on_real_release` guard on the job
    # filters them out.
    types: [published]
  workflow_dispatch:
    inputs:
      cap_env:
        description: 'Capacitor environment (latest|prod)'
        required: false
        default: ''
      cap_server_url:
        description: 'Override the WebView URL (takes priority over cap_env)'
        required: false
        default: ''
      skip_upload:
        description: 'Build only, skip TestFlight upload'
        type: boolean
        required: false
        default: false

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  # Needed so the workflow can push back the auto-scaffolded ios/ directory
  # on the very first run.
  contents: write

jobs:
  build:
    runs-on: [self-hosted, macos-mini]
    timeout-minutes: 45
    # Skip prereleases — they wouldn't go to the production TestFlight
    # track anyway, and the `published` event fires for them too.
    if: github.event_name != 'release' || !github.event.release.prerelease

    env:
      # Resolve CAP_ENV: manual dispatch input > release publish (always
      # prod) > push to main (prod) > push to any other branch (latest).
      CAP_ENV: ${{ github.event.inputs.cap_env != '' && github.event.inputs.cap_env || ((github.event_name == 'release' || github.ref == 'refs/heads/main') && 'prod' || 'latest') }}
      SCHEME: App
      PROJECT: ios/App/App.xcodeproj
      ARCHIVE_PATH: ${{ github.workspace }}/build/App.xcarchive
      EXPORT_PATH: ${{ github.workspace }}/build/export
      EXPORT_OPTIONS: ${{ github.workspace }}/scripts/ios/ExportOptions.plist

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so `git rev-list --count HEAD` produces a monotonic
          # CFBundleVersion. Shallow fetch would always yield 1.
          fetch-depth: 0

      - name: Setup Homebrew PATH
        run: |
          # The self-hosted runner launches from a LaunchAgent which does
          # not source ~/.zprofile, so Homebrew's PATH must be injected.
          if [[ -x /opt/homebrew/bin/brew ]]; then
            echo "/opt/homebrew/bin" >> "$GITHUB_PATH"
            echo "/opt/homebrew/sbin" >> "$GITHUB_PATH"
          elif [[ -x /usr/local/bin/brew ]]; then
            echo "/usr/local/bin" >> "$GITHUB_PATH"
          fi

      - name: Show environment
        run: |
          echo "CAP_ENV=$CAP_ENV"
          echo "ref=${{ github.ref }}"
          sw_vers
          echo "xcode-select path: $(xcode-select -p)"
          if [[ "$(xcode-select -p)" == */CommandLineTools* ]]; then
            echo "::error::xcode-select points at Command Line Tools. Run:"
            echo "::error::  sudo xcode-select -s /Applications/Xcode.app/Contents/Developer"
            exit 1
          fi
          xcodebuild -version
          node --version
          npm --version
          pod --version || true

      - name: Install npm dependencies
        run: npm ci

      - name: Scaffold iOS project (first run only)
        id: scaffold
        run: |
          set -euo pipefail
          if [[ ! -d ios/App/App.xcodeproj ]]; then
            echo "iOS project missing — running 'npx cap add ios' to scaffold"
            npx cap add ios
            echo "scaffolded=true" >> "$GITHUB_OUTPUT"
          else
            echo "scaffolded=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit scaffolded iOS project
        if: steps.scaffold.outputs.scaffolded == 'true' && github.event_name == 'push'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.email 'ios-ci@whoeverwants.app'
          git config user.name 'iOS CI Bot'
          git add ios/
          git commit -m "chore(ios): auto-scaffold Capacitor iOS project"
          git push origin HEAD:${{ github.ref_name }}

      - name: Resolve CAP_SERVER_URL for this build
        id: server_url
        run: |
          set -euo pipefail
          if [[ -n "${{ github.event.inputs.cap_server_url }}" ]]; then
            URL="${{ github.event.inputs.cap_server_url }}"
          elif [[ "$CAP_ENV" == "prod" ]]; then
            URL=""  # capacitor.config.ts defaults to prod when unset
          else
            # The `latest` build points at the canary tier (auto-deployed on
            # every push to main) — "code that's exactly what'll ship next",
            # the stable target for TestFlight diagnosis. The retired
            # per-author URL form (`<email-slug>.dev.whoeverwants.com`) has
            # no upstream container under the per-branch dev-server model,
            # so a literal `latest.whoeverwants.com` is the only viable
            # destination for the non-prod iOS tier.
            URL="https://latest.whoeverwants.com"
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          [[ -n "$URL" ]] && echo "WebView URL: $URL" || echo "WebView URL: (prod default)"

      - name: Sync Capacitor (copy web assets + plugins → iOS project)
        env:
          CAP_SERVER_URL: ${{ steps.server_url.outputs.url }}
        run: npx cap sync ios

      - name: Restore App Store Connect API key
        id: apikey
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_KEY_ISSUER: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
          API_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
        run: |
          set -euo pipefail
          KEY_DIR="$HOME/.appstoreconnect/private_keys"
          mkdir -p "$KEY_DIR"
          KEY_FILE="$KEY_DIR/AuthKey_${API_KEY_ID}.p8"
          # Accept either raw PEM or base64-encoded PEM. Single-line base64
          # is much harder to corrupt via copy-paste than multi-line PEM.
          if [[ "$API_KEY_P8" == *"BEGIN PRIVATE KEY"* ]]; then
            printf '%s\n' "$API_KEY_P8" > "$KEY_FILE"
          else
            printf '%s' "$API_KEY_P8" | base64 --decode > "$KEY_FILE"
          fi
          chmod 600 "$KEY_FILE"
          head -1 "$KEY_FILE" | grep -q 'BEGIN PRIVATE KEY' || {
            echo "::error::APP_STORE_CONNECT_API_KEY_P8 decoded content is not PEM"
            exit 1
          }
          # Diagnostics (safe — only counts + hashes, never the content):
          echo "P8 bytes: $(wc -c < "$KEY_FILE")"
          echo "P8 sha256: $(shasum -a 256 "$KEY_FILE" | awk '{print $1}')"
          echo "key_path=$KEY_FILE" >> "$GITHUB_OUTPUT"
          echo "key_id=$API_KEY_ID" >> "$GITHUB_OUTPUT"
          echo "issuer_id=$API_KEY_ISSUER" >> "$GITHUB_OUTPUT"

      - name: Compute bundle identity (per-env)
        id: bundle
        run: |
          set -euo pipefail
          # Prod uses the canonical bundle ID; the canary (latest) tier uses
          # a single shared `.latest` suffix so AASA + Apple Developer portal
          # only have to register one non-prod bundle. Both bundles MUST be
          # registered separately in Apple Developer Portal (Identifiers,
          # with Push Notifications + Associated Domains capabilities) AND
          # in App Store Connect (a New App record per bundle) before
          # `xcrun altool --upload-app` can find them — otherwise the
          # upload step fails with "Cannot determine the Apple ID from
          # Bundle ID ... (12)".
          #
          # APPLE_ID is the numeric App Store Connect app id, passed to
          # altool via `--apple-id` at upload time. This is load-bearing:
          # altool's bundle-id auto-detection does a PREFIX match, so
          # `com.whoeverwants.app` ambiguously matches `.app`, `.app.latest`,
          # AND `.app.dev.samcarey`, and altool picks the wrong sibling
          # (observed: prod uploads routed to the `.latest` app record,
          # surfacing as `bundle identifier cannot be changed from the
          # current value, 'com.whoeverwants.app.latest'` + `bundle version
          # must be higher than '<canary build #>'`). Canary worked by luck
          # — `.latest` has no sibling extending its prefix. Pinning the
          # numeric Apple ID removes the ambiguity for both tiers. Look up a
          # new tier's Apple ID via the ASC API (`GET /v1/apps`) or the app's
          # ASC URL (`appstoreconnect.apple.com/apps/<APPLE_ID>/...`).
          if [[ "$CAP_ENV" == "prod" ]]; then
            BUNDLE_ID="com.whoeverwants.app"
            DISPLAY_NAME="Decide"
            APPLE_ID="6762459339"
          else
            BUNDLE_ID="com.whoeverwants.app.latest"
            DISPLAY_NAME="Decide α"
            APPLE_ID="6769589158"
          fi
          echo "bundle_id=$BUNDLE_ID"    >> "$GITHUB_OUTPUT"
          echo "display_name=$DISPLAY_NAME" >> "$GITHUB_OUTPUT"
          echo "apple_id=$APPLE_ID" >> "$GITHUB_OUTPUT"
          echo "Building as $BUNDLE_ID / '$DISPLAY_NAME' (Apple ID $APPLE_ID)"

      - name: Stamp Info.plist display name
        run: |
          set -euo pipefail
          plutil -replace CFBundleDisplayName -string "${{ steps.bundle.outputs.display_name }}" ios/App/App/Info.plist
          plutil -extract CFBundleDisplayName raw ios/App/App/Info.plist

      - name: Stamp Info.plist with Google iOS URL scheme
        env:
          GOOGLE_IOS_CLIENT_ID_PROD: ${{ secrets.GOOGLE_IOS_CLIENT_ID_PROD }}
          GOOGLE_IOS_CLIENT_ID_LATEST: ${{ secrets.GOOGLE_IOS_CLIENT_ID_LATEST }}
        run: |
          set -euo pipefail
          # Native Google Sign In via @capgo/capacitor-social-login requires
          # the reversed iOS client ID registered as a URL scheme so the
          # system can hand control back to the app after the Google sheet
          # completes. Client IDs are per-bundle (one per Google Cloud iOS
          # OAuth client) — pick the right one based on CAP_ENV.
          if [[ "$CAP_ENV" == "prod" ]]; then
            CLIENT_ID="$GOOGLE_IOS_CLIENT_ID_PROD"
          else
            CLIENT_ID="$GOOGLE_IOS_CLIENT_ID_LATEST"
          fi
          if [[ -z "$CLIENT_ID" ]]; then
            echo "::error::GOOGLE_IOS_CLIENT_ID secret is empty for CAP_ENV=$CAP_ENV — set GOOGLE_IOS_CLIENT_ID_PROD and GOOGLE_IOS_CLIENT_ID_LATEST in repo secrets."
            exit 1
          fi
          # Reverse the dot-separated parts:
          #   <hash>-<random>.apps.googleusercontent.com
          #     →  com.googleusercontent.apps.<hash>-<random>
          REVERSED=$(echo "$CLIENT_ID" | awk -F. '{ for(i=NF;i>0;i--) printf "%s%s", $i, (i>1?".":"") }')
          echo "Reversed URL scheme: $REVERSED"
          # Use /usr/libexec/PlistBuddy for the nested-structure insert.
          # An earlier iteration of this step used `plutil -insert -xml`,
          # which corrupted Info.plist on macOS — the root element ended
          # up non-dict and xcodebuild's `builtin-infoPlistUtility` failed
          # with "contents of file is not a dictionary". PlistBuddy is the
          # canonical Apple tool for this and handles nested arrays/dicts
          # without quoting traps.
          PLIST="ios/App/App/Info.plist"
          # Idempotent: a fresh checkout has no CFBundleURLTypes key.
          /usr/libexec/PlistBuddy -c "Delete :CFBundleURLTypes" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes array" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0 dict" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLSchemes array" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLSchemes:0 string $REVERSED" "$PLIST"
          # Verify the result and confirm the root is still a dict.
          /usr/libexec/PlistBuddy -c "Print :CFBundleURLTypes" "$PLIST"
          plutil -lint "$PLIST"

      - name: Rewrite bundle ID in project.pbxproj
        run: |
          set -euo pipefail
          BUNDLE_ID="${{ steps.bundle.outputs.bundle_id }}"
          PBX="ios/App/App.xcodeproj/project.pbxproj"
          # Automatic signing ignores command-line PRODUCT_BUNDLE_IDENTIFIER
          # overrides, so we patch the project file directly. Every build
          # starts from git state, so the patch doesn't persist.
          BEFORE=$(grep -c 'PRODUCT_BUNDLE_IDENTIFIER = com\.whoeverwants\.app' "$PBX" || true)
          sed -i.bak -E \
            "s|PRODUCT_BUNDLE_IDENTIFIER = com\.whoeverwants\.app[^;]*;|PRODUCT_BUNDLE_IDENTIFIER = ${BUNDLE_ID};|g" \
            "$PBX"
          rm -f "$PBX.bak"
          AFTER=$(grep -c "PRODUCT_BUNDLE_IDENTIFIER = ${BUNDLE_ID};" "$PBX" || true)
          if [[ "$BEFORE" -lt 2 || "$AFTER" != "$BEFORE" ]]; then
            echo "::error::pbxproj patch mismatch (expected $BEFORE matches pre-sed; got $AFTER post-sed)"
            grep PRODUCT_BUNDLE_IDENTIFIER "$PBX"
            exit 1
          fi
          echo "Patched $AFTER bundle ID occurrence(s) to $BUNDLE_ID"

      - name: Compute build number
        id: build_number
        run: |
          # Unix epoch seconds — monotonic, unique per build (sub-second
          # builds aren't possible in this workflow), forward-proof
          # forever. The earlier scheme used `git rev-list --count HEAD`,
          # which is monotonic on a single branch but collides across
          # branches when prod (main count) lags canary (per-branch count).
          # The failure mode showed up after a canary build at #861 was
          # uploaded successfully: every prod build attempt at #859 was
          # then rejected by ASC with
          #   `bundle version must be higher than the previously uploaded
          #    version: '861'`
          # — apparently `.app` and `.latest` share CFBundleVersion space
          # at the App Store Connect team level (same Bundle ID Prefix
          # `com.whoeverwants`). Switching to `date +%s` sidesteps the
          # whole class of cross-bundle / cross-branch counter collisions
          # because no two workflow runs ever share the same epoch second.
          # Apple accepts up to 18 chars; current 10-digit epoch fits.
          BN=$(date +%s)
          echo "build_number=$BN" >> "$GITHUB_OUTPUT"
          echo "Using CFBundleVersion=$BN"

      - name: Unlock CI keychain
        env:
          CI_KEYCHAIN_PASSWORD: ${{ secrets.CI_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          KC="$HOME/Library/Keychains/ci.keychain-db"
          if [[ ! -f "$KC" ]]; then
            echo "::error::$KC not found — run scripts/ios/mac-bootstrap.sh or create it manually."
            exit 1
          fi
          # Make sure the CI keychain is in the search list and default.
          security list-keychains -d user -s "$KC" "$HOME/Library/Keychains/login.keychain-db"
          security default-keychain -s "$KC"
          security unlock-keychain -p "$CI_KEYCHAIN_PASSWORD" "$KC"
          # Avoid mid-build re-lock. This occasionally errors under SSH,
          # but is tolerant here — the default 5-min timeout is plenty.
          security set-keychain-settings -t 3600 "$KC" || true

      - name: Clear cached provisioning profiles
        run: |
          set -euo pipefail
          # Cached provisioning profiles live OUTSIDE DerivedData (so
          # `xcodebuild clean` doesn't touch them). With automatic
          # signing + `-allowProvisioningUpdates`, Xcode SHOULD fetch a
          # fresh profile for the target bundle id — but in practice it
          # often reuses a cached profile whose bundle id matches a
          # SIBLING bundle (e.g. com.whoeverwants.app.latest left over
          # from a canary build) and embeds that into the .app's
          # embedded.mobileprovision. ASC then rejects with
          #   `Validation failed (409) ... bundle identifier cannot be
          #    changed from the current value, '<sibling-bundle>'`
          # because the embedded profile's bundle id disagrees with the
          # IPA's Info.plist. Nuking the cache before each build forces
          # ASC fetch via `-allowProvisioningUpdates`, restoring profile-
          # to-bundle-id consistency. Cost: a few seconds per build for
          # the fetch round-trip.
          DIRS=(
            "$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles"
            "$HOME/Library/MobileDevice/Provisioning Profiles"
          )
          for d in "${DIRS[@]}"; do
            if [[ -d "$d" ]]; then
              # List first for the build log, then delete contents.
              echo "Clearing: $d"
              ls -1 "$d" || true
              find "$d" -mindepth 1 -delete
            fi
          done
          echo "Provisioning profile cache cleared."

      - name: Archive
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          BUILD_NUMBER: ${{ steps.build_number.outputs.build_number }}
          BUNDLE_ID: ${{ steps.bundle.outputs.bundle_id }}
        run: |
          set -euo pipefail
          mkdir -p build
          # `clean` before `archive` is load-bearing for prod (and any) builds:
          # the Mac runner's DerivedData persists across workflow runs, and
          # an incremental archive can re-use the previously-compiled App
          # binary whose Mach-O __info_plist segment still has the prior
          # build's CFBundleIdentifier baked in. The outer Info.plist
          # generation runs fresh (gets the new patched PRODUCT_BUNDLE_IDENTIFIER),
          # but the binary's embedded plist doesn't, leading to two
          # disagreeing bundle ids in the IPA. ASC's altool validator reads
          # both and rejects with `Validation failed (409) ... The bundle
          # identifier cannot be changed from the current value, '<prior>'`.
          # `clean` forces full re-link so the embedded plist regenerates
          # from the patched pbxproj. Trade-off: slower archive (~30s →
          # ~2min), acceptable because iOS builds only run on native-file
          # changes / release publishes / push-to-main.
          xcodebuild \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$ARCHIVE_PATH" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "${{ steps.apikey.outputs.key_path }}" \
            -authenticationKeyID "${{ steps.apikey.outputs.key_id }}" \
            -authenticationKeyIssuerID "${{ steps.apikey.outputs.issuer_id }}" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            clean archive > build/xcodebuild-archive.log 2>&1 || {
              echo "::error::Archive failed — tail of log:"
              tail -100 build/xcodebuild-archive.log
              exit 1
            }
          echo "Archive complete."

      - name: Export IPA
        run: |
          set -euo pipefail
          xcodebuild \
            -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist "$EXPORT_OPTIONS" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "${{ steps.apikey.outputs.key_path }}" \
            -authenticationKeyID "${{ steps.apikey.outputs.key_id }}" \
            -authenticationKeyIssuerID "${{ steps.apikey.outputs.issuer_id }}" \
            > build/xcodebuild-export.log 2>&1 || {
              echo "::error::Export failed — tail of log:"
              tail -100 build/xcodebuild-export.log
              exit 1
            }
          ls -la "$EXPORT_PATH"

      - name: Upload to TestFlight
        if: ${{ github.event.inputs.skip_upload != 'true' }}
        run: |
          set -euo pipefail
          IPA=$(ls "$EXPORT_PATH"/*.ipa | head -n1)
          echo "Uploading $IPA to TestFlight..."
          # altool prints errors but sometimes returns 0 when it shouldn't.
          # Tee to a log and grep for UPLOAD FAILED as a belt-and-suspenders.
          # --apple-id pins the exact App Store Connect app (see the
          # "Compute bundle identity" step's comment) — without it,
          # altool's bundle-id prefix auto-detection mis-routes the prod
          # `.app` IPA to the `.latest` app record.
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA" \
            --apple-id "${{ steps.bundle.outputs.apple_id }}" \
            --apiKey "${{ steps.apikey.outputs.key_id }}" \
            --apiIssuer "${{ steps.apikey.outputs.issuer_id }}" \
            2>&1 | tee build/altool-upload.log
          # altool exits 0 even when it rejects the upload, so we MUST scan
          # the output for failure markers. Two patterns observed so far:
          #   * "UPLOAD FAILED" — explicit failure banner
          #   * "ERROR:" — surfaced when e.g. the bundle id isn't registered
          #                in App Store Connect ("Cannot determine the Apple
          #                ID from Bundle ID ... (12)"). The original grep
          #                missed this because the error line lacks "UPLOAD
          #                FAILED" verbatim.
          if grep -q -E "UPLOAD FAILED|^.*ERROR:" build/altool-upload.log; then
            echo "::error::altool reported a failure (exit code was misleading)"
            grep -E "UPLOAD FAILED|ERROR:" build/altool-upload.log || true
            exit 1
          fi
          if ! grep -q -E "No errors uploading|successful upload" build/altool-upload.log; then
            echo "::error::altool output did not contain a success marker"
            exit 1
          fi

      - name: Upload archive as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-logs-${{ github.run_id }}
          path: build/*.log
          retention-days: 7
