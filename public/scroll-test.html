<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Scroll Test</title>
  <style>
    body { margin: 0; font-family: system-ui; padding-left: env(safe-area-inset-left); padding-right: env(safe-area-inset-right); }
    .item { padding: 12px 16px; border-bottom: 1px solid #eee; height: 60px; display: flex; align-items: center; box-sizing: border-box; }
    .title { padding: 16px; font-size: 24px; font-weight: bold; text-align: center; }
    #log { position: fixed; bottom: 4px; left: 4px; right: 4px; background: rgba(0,0,0,0.8); color: lime; font: 10px monospace; padding: 4px; z-index: 100; max-height: 30vh; overflow-y: auto; border-radius: 4px; }
  </style>
</head>
<body>
  <div class="title">Plain Scroll Test</div>
  <div id="list"></div>
  <div id="log"></div>
  <script>
    // Fill with ~16 items so page height ≈ our home page (1176px)
    const list = document.getElementById('list');
    for (let i = 1; i <= 16; i++) {
      const d = document.createElement('div');
      d.className = 'item';
      d.textContent = 'Item ' + i + ' — dummy content to fill vertical space';
      list.appendChild(d);
    }
    // Log scroll trace
    const log = document.getElementById('log');
    let lastY = window.scrollY, lastT = Date.now(), lines = [];
    function addLine(s) {
      lines.unshift(s);
      if (lines.length > 25) lines.pop();
      log.textContent = lines.join('\n');
    }
    addLine('ready. sh=' + document.documentElement.scrollHeight + ' wh=' + window.innerHeight);
    window.addEventListener('scroll', () => {
      const y = window.scrollY, now = Date.now();
      const dy = y - lastY, dt = now - lastT;
      if (Math.abs(dy) > 0) {
        const sh = document.documentElement.scrollHeight, wh = window.innerHeight;
        addLine('+' + dt + 'ms dy=' + dy + ' y=' + y + ' sh=' + sh + ' wh=' + wh);
      }
      lastY = y; lastT = now;
    }, { passive: true });
  </script>
</body>
</html>
