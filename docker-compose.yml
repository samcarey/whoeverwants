services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: whoeverwants
      POSTGRES_PASSWORD: whoeverwants
      POSTGRES_DB: whoeverwants
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U whoeverwants"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: ./server
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://whoeverwants:whoeverwants@db:5432/whoeverwants
      FAVICON_CACHE_PATH: /app/cache/favicon_cache.json
    env_file:
      - .env.api
    volumes:
      - api_cache:/app/cache
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      db:
        condition: service_healthy

  # Next.js frontend runs as a systemd service (not Docker) to avoid OOM on 1GB droplet
  # See /etc/systemd/system/whoeverwants-web.service

volumes:
  pgdata:
  api_cache:
